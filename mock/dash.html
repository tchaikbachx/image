<html lang="en">
<head>

</head>
<body>
    <main class="content">
        <header class="dept-banner">
            <h1>Inventory Checkout</h1>
        </header>

        <div class="dashboard-box">

                <input type="text" id="dashboardSearch" placeholder="Search for..." onkeyup="filterDash()">

                    <button onclick="filterCategory('search')">Search</button>
                    <button onclick="filterCategory('filter')">Filter</button>
                </div>

                    <button>+</button>
                    <button>-</button>
                </div>
            </div>

            <div class="grid" id="cardContainer">
                <div class="card" data-category="search">
                    <h3>Entry</h3>
                    <p>[entry 1 data here]</p>
                </div>
                <div class="card" data-category="search">
                    <h3>Entry</h3>
                    <p>[entry 2 data here]</p>
                </div>
                <div class="card" data-category="search">
                    <h3>Entry</h3>
                    <p>[entry 3 data here]</p>
                </div>
            </div>
        </div>
    </main>
    <script src="script/filter.js"></script>
</body>
</html>
