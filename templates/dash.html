<!-- MOVE SCRIPTS TO EXTERNAL FILES TO MAINTAIN PURE HTML INFRASTRUCTURE -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/templates/style/style.css">
  <title>Tchaikbachx | Inventory </title>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="script/app.js"></script>
  <script src="/templates/script/app.js"></script>
  <script>
    (function () {
      const checkExist = setInterval(function () {
        const staffContainer = document.getElementById('staffActions');
        const isStaff = localStorage.getItem('isStaff') === 'true';

        if (staffContainer) {
          if (isStaff) {
            document.body.setAttribute('data-logged-in', 'true');
            staffContainer.innerHTML = `
          <button type="button" id="addInstrumentBtn" onclick="openAddModal()">🞣</button>
          <button type="button" id="delete-mode-btn" onclick="toggleDeleteMode()">🞪</button>
          <button type="button" id="edit-mode-btn" onclick="toggleEditMode()">✎</button>
        `;
            // deal with adding logout to navbar cleanly
            const mainNav = document.getElementById('mainNav');
            if (mainNav && !document.getElementById('logoutBtn')) {
              const logoutBtn = document.createElement('button');
              logoutBtn.id = 'logoutBtn';
              logoutBtn.textContent = 'Logout';
              logoutBtn.className = 'nav-btn';
              logoutBtn.onclick = () => {
                localStorage.removeItem('isStaff');
                window.location.replace('/');
              };
              mainNav.appendChild(logoutBtn);
            } // if
          } // if
          clearInterval(checkExist);
        } // if
      }, 100);
    })();
  </script>
</head>

<body x-data="inventory" data-logged-in="false">
  <!-- navigation bar -->
  <nav id="mainNav" class="navbar">
    <a href="/" class="nav-link">Home</a>
  </nav>

  <!-- banner  -->
  <main class="content">
    <header class="dept-banner">
      <h1>Inventory Dashboard</h1>
    </header>

    <!-- main dash section -->
    <div class="dashboard-box">
      <!-- top tool area; contains search and all those buttons nearby -->
      <div class="toolbar">
        <!-- normal searching -->
        <div class="search-container">
          <input type="text" id="dashboardSearch" x-model="searchQuery"
            placeholder="Search by name, type, make, or model...">
          <!-- advanced searching -->
          <button type="button" class="filter-btn" onclick="openAdvancedModal()">
            Advanced
          </button>
        </div>
        <div id="staffActions" class="update-group"></div>
      </div>

      <!-- instrument containers/cards -->
      <div class="dashboard-main-content">
        <div class="scroll-container">
          <div class="instrument-grid" x-data="inventory">
            <input type="text" x-model="searchQuery" placeholder="Search instruments...">

            <template x-for="item in filteredInstruments" :key="item.ID">
              <div class="instrument-card" :class="{'delete-shake': isDeleteMode}">
                <div class="card-header">
                  <h3 x-text="item.Name_ID"></h3>
                  <span class="status-badge" :class="item.Status === 'IN' ? 'status-in' : 'status-out'"
                    x-text="item.Status"></span>
                </div>
                <div class="card-body">
                  <p><strong>Type:</strong> <span x-text="item.Type"></span></p>
                  <p><strong>Make:</strong> <span x-text="item.Make"></span></p>
                </div>

                <template x-if="isStaff && isDeleteMode">
                  <button @click="deleteInstrument(item.ID)" class="btn-delete">Confirm Delete</button>
                </template>
              </div>
            </template>
          </div>
          <!-- <div id="instrument-grid" class="instrument-grid">
            <p>Loading instruments from database...</p>
          </div> -->
        </div>

        <!-- instrument info panel -->
        <div id="details-sidebar" class="details-panel">
          <div id="sidebar-inner-container">
            <!-- contains the top card part with the status, pic, and name -->
            <div class="header-card">
              <div class="instrument-visual-large">
                <div id="detail-picture-container"
                  style="width:100%; height:100%; background-size:cover; background-position:center; border-radius:10px; display:none;">
                </div>
                <span id="detail-icon" style="display:block;"></span>
              </div>
              <div class="header-text-large">
                <h2 id="detail-name">---</h2>
                <span id="detail-status-badge" class="status-indicator-pill">---</span>
                <button class="close-btn" onclick="closeDetails()">&times;</button>
              </div>
            </div>

            <!-- this is the tab divider -->
            <div class="sidebar-header">
              <div class="sidebar-tabs">
                <button id="tab-details" class="tab-btn active" onclick="switchTab('details')">Details</button>
                <button id="tab-manage" class="tab-btn" onclick="switchTab('manage')">Manage</button>
              </div>
            </div>

            <!-- divided general info into public and staff-restricted ids; all is stored in the
             "details" tab -->
            <div id="details-content" class="tab-pane active">
              <div class="details-grid">
                <div id="public-info">
                  <div class="detail-item"><strong>Type</strong><span id="detail-type">---</span></div>
                  <div class="detail-item"><strong>Make</strong><span id="detail-make">---</span></div>
                  <div class="detail-item"><strong>Grade</strong><span id="detail-grade">---</span></div>
                  <div class="detail-item"><strong>Model</strong><span id="detail-model">---</span></div>
                  <div class="detail-item"><strong>Serial #</strong><span id="detail-serial">---</span></div>
                  <div class="detail-item"><strong>Price</strong><span id="detail-price">---</span></div>
                </div>

                <div id="staff-only-info">
                  <div class="detail-item" data-staff-only="true"><strong>Location</strong><span
                      id="detail-stored">---</span></div>
                  <div class="detail-item"><strong>Dept</strong><span id="detail-dept">---</span></div>
                  <div class="detail-item" data-staff-only="true"><strong>Old ID</strong><span
                      id="detail-oldid">---</span>
                  </div>
                  <div class="detail-item" data-staff-only="true"><strong>Notes</strong><span
                      id="detail-notes">N/A</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- handles checkout/in functions in "manage" tab -->
            <div id="manage-content" class="tab-pane" style="display: none;">
              <div id="checkout-form" class="info-box">
                <h3>Checkout</h3>
                <div class="filter-field">
                  <label>Student Email</label>
                  <input type="email" id="checkout-email" placeholder="username@grinnell.edu">
                </div>
                <div class="filter-field">
                  <label>Due Date</label>
                  <input type="date" id="checkout-due">
                </div>
                <!-- FIX: should migrate styling to .css -->
                <button class="btn-primary" onclick="processTransaction('checkout')"
                  style="width:100%; margin-top:10px;">
                  Confirm Checkout
                </button>
              </div>

              <div id="checkin-form" class="info-box" style="display:none;">
                <h3>Check-in Instrument</h3>
                <p id="loan-info"></p>
                <button class="btn-primary" onclick="processTransaction('checkin')"
                  style="width:100%; background-color: var(--ol);">
                  Confirm
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>
  </main>

  <!-- add an instrument: button extension -->
  <div id="addInstrumentModal" class="modal">
    <div class="modal-content" style="max-width: 600px; width: 90%;">
      <!-- FIX: need to migrate close styling to .css -->
      <button class="close-btn" onclick="closeAddModal()"
        style="position:absolute; top:10px; right:15px; background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
      <h2 style="color:var(--ol); margin-top:0;">Add New Instrument</h2>

      <!-- FIX: need to edit add instrument modal to look less ugly -->
      <form id="addInstrumentForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <input type="text" id="m_Name_ID" placeholder="Name (e.g., Violin4)" required>
        <input type="text" id="m_Type" placeholder="Type (e.g., Violin)" required>
        <input type="text" id="m_Make" placeholder="Make (e.g., Yamaha)">
        <input type="text" id="m_Model" placeholder="Model">
        <input type="text" id="m_Grade" placeholder="Grade (A, B, C)">
        <input type="text" id="m_Old_ID" placeholder="Old ID/Legacy Tag">
        <input type="text" id="m_Serial" placeholder="Serial Number">
        <input type="number" id="m_Price" placeholder="Price" step="0.01" min="0" onblur="formatPrice(this)">
        <input type="text" id="m_Stored" placeholder="Locker Number">
        <input type="text" id="m_Dept" placeholder="Dept ID">

        <button type="button" onclick="submitNewInstrument()"
          style="grid-column: span 2; background:var(--ol); color:white; font-weight:bold; padding:12px;">Save to
          Database</button>
      </form>
    </div>
  </div>

  <!-- advanced filtering stuff -->
  <div id="advancedFilterModal" class="modal">
    <div class="modal-content filter-size">
      <span class="close" onclick="closeAdvancedModal()">&times;</span>
      <h2>Advanced Filter</h2>

      <div class="filter-form">
        <div class="filter-field">
          <label>Type</label>
          <input type="text" id="adv_Type" x-model="advType" placeholder="e.g. Cello">
        </div>
        <div class="filter-field">
          <label>Make</label>
          <input type="text" id="adv_Make" x-model="advMake" placeholder="e.g. Yamaha">
        </div>
        <div class="filter-field">
          <label>Grade</label>
          <input type="text" id="adv_Grade" x-model="advGrade" placeholder="A, B, C">
        </div>
        <div class="filter-field">
          <label>Location</label>
          <input type="text" id="adv_Loc" x-model="advLocation" placeholder="Locker #">
        </div>
        <div class="filter-field full-width">
          <label>Serial Number</label>
          <input type="text" id="adv_Serial" x-model="advSerial" placeholder="Partial serial...">
        </div>

        <div class="price-slider-group">
          <div class="price-header">
            <label>Price Range</label>
            <span id="priceDisplay" class="price-display">Max Price: $9999</span>
          </div>
          <input type="range" id="adv_PriceMax" class="slider" x-model="advPrice" min="0" max="9999" value="9999">
        </div>

        <button class="btn-secondary" onclick="resetAllFilters()">Reset</button>
        <button class="btn-primary" onclick="closeAdvancedModal()">Done</button>
      </div>
    </div>
  </div>

  <!-- <footer> ... FIX: messes up the containers
        &copy; <script>document.write(new Date().getFullYear());</script> Tchaikbachx.
    </footer> -->
</body>

</html>
